# imagod.toml template (current accepted keys from implementation)
# Rule: required keys are active lines; optional keys are commented lines.
# Note: autocreate output keeps English comments in this style.

# optional | type=string
# constraint: must be parseable as SocketAddr at server bootstrap
# default: "[::]:4443"
# listen_addr = "[::]:4443"

# optional | type=string(path)
# constraint: none at load-time
# default resolution order:
#   1) explicit storage_root in imagod.toml
#   2) build-time IMAGOD_STORAGE_ROOT_DEFAULT (if non-empty)
#   3) OS default (linux=/var/lib/imago, macos=/usr/local/var/imago, windows=C:\ProgramData\imago, fallback=/var/lib/imago)
# storage_root = "/var/lib/imago"

# optional | type=string
# constraint: none at load-time
# default: "imagod/0.1.0"
# server_version = "imagod/0.1.0"

# optional | type=string
# constraint: YYYY-MM-DD (month 1..12, day 1..31)
# default: "2026-02-10"
# compatibility_date = "2026-02-10"

[tls]
# required | type=string(path)
# constraint: none at load-time (runtime bootstrap loads key material)
# default: none
# autocreate: writes "<config_dir>/server.key" as absolute path and generates key material if missing
server_key = "/absolute/path/to/server.key"

# optional | type=array<string>
# constraint: each entry is ed25519 raw public key hex (64 hex chars), unique,
#             and must not overlap tls.client_public_keys
# default: []
# admin_public_keys = [
#   "2222222222222222222222222222222222222222222222222222222222222222",
# ]

# required | type=array<string>
# constraint: each entry is ed25519 raw public key hex (64 hex chars), unique; empty array is allowed
# default: none (autocreate writes [])
client_public_keys = []

# optional | type=table<string,string>
# constraint: authority key must be non-empty after trim;
#             value must be ed25519 raw public key hex (64 hex chars)
# default: {}
# known_public_keys = { "rpc://node-a:4443" = "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa" }

[runtime]
# optional table | type=table
# constraint: each field validates independently when present
# default: all fields below use their per-key defaults

# optional | type=integer (usize) | constraint=1..=8388608 | default=1048576
# chunk_size = 1048576

# optional | type=integer (usize) | constraint>=1 | default=16
# max_inflight_chunks = 16

# optional | type=integer (u64) | constraint>=1 | default=67108864
# max_artifact_size_bytes = 67108864

# optional | type=integer (u64) | constraint=load-time validation none | default=900
# upload_session_ttl_secs = 900

# optional | type=integer (u64) | constraint>=1 | default=30
# stop_grace_timeout_secs = 30

# optional | type=integer (u64) | constraint>=1 | default=3
# runner_ready_timeout_secs = 3

# optional | type=integer (usize) | constraint>=1 | default=262144
# runner_log_buffer_bytes = 262144

# optional | type=integer (u64) | constraint>=1 | default=50
# epoch_tick_interval_ms = 50

# optional | type=integer (u32) | constraint=1..=4 | default=2
# http_worker_count = 2

# optional | type=integer (u32) | constraint=1..=16 | default=4
# http_worker_queue_capacity = 4

# optional | type=integer (u64) | constraint>=1 | default=500
# manager_control_read_timeout_ms = 500

# optional | type=integer (u32) | constraint>=1 | default=256
# max_concurrent_sessions = 256

# optional | type=integer (u64) | constraint>=1 | default=15
# deploy_stream_timeout_secs = 15

# unsupported / deprecated keys (load error):
# protocol_draft = "imago-mvp-v1"
# tls.server_cert = "server.crt"
# tls.client_ca_cert = "ca.crt"
