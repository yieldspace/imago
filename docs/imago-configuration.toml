# imago.toml template aligned with crates/imago-cli/src/commands/build/mod.rs
# Required keys are active lines.
# Optional keys are commented out with metadata.
# Metadata format:
# - required: required|optional
# - type: TOML type
# - constraints: runtime validation rules
# - default: value when omitted (if any)

# key: name
# required: required
# type: string
# constraints: 1..=63 chars; ASCII [A-Za-z0-9._-] only; no '/' '\\' '..'
# default: none
name = "example-service"

# key: main
# required: required
# type: string (relative path)
# constraints: non-empty; relative only; no backslashes; no windows drive prefix; no path traversal; file must exist
# default: none
main = "build/app.wasm"

# key: type
# required: required
# type: string enum
# constraints: one of "cli", "http", "socket", "rpc"
# default: none
# note: [http] is allowed only when type="http"; [socket] is allowed only when type="socket" (mutually exclusive)
type = "http"

# key: restart
# required: optional
# type: string enum
# constraints: one of "never", "on-failure", "always", "unless-stopped"
# default: "never"
# restart = "never"

# [build]
# key: build.command
# required: optional
# type: string OR array(string)
# constraints: string must be non-empty; array must be non-empty and all elements must be strings
# default: none
# [build]
# command = "cargo component build --release"

# [vars] (legacy; accepted but ignored)
# key: vars.<KEY>
# required: optional
# type: string
# constraints: table values must be strings; values are not emitted to manifest
# default: empty table
# [vars]
# APP_MODE = "prod"

# [secrets] (legacy; accepted but ignored)
# key: secrets.<KEY>
# required: optional
# type: string
# constraints: table values must be strings; values are not emitted to manifest
# default: empty table
# [secrets]
# SECRET_TOKEN = "change-me"

# [target.<name>] (selected by CLI target argument; default target name is "default")
[target.default]
# key: target.<name>.remote
# required: required (for selected target)
# type: string
# constraints: string required; endpoint format is validated in deploy/run paths
# default: none
remote = "127.0.0.1:4443"

# key: target.<name>.server_name
# required: optional
# type: string
# constraints: must be a string
# default: none
# server_name = "node-a.example.com"

# key: target.<name>.client_key
# required: optional for build; required for deploy
# type: string (path)
# constraints: non-empty; no backslashes; no windows drive prefix; no path traversal; relative paths resolve from project root; absolute paths allowed
# default: none
# client_key = "certs/client.key"

# [http] (required when type="http")
[http]
# key: http.port
# required: required when type="http"
# type: integer
# constraints: 1..=65535
# default: none
port = 8080

# key: http.max_body_bytes
# required: optional when type="http"
# type: integer
# constraints: 1..=67108864 (64 MiB)
# default: 8388608 (8 MiB)
# max_body_bytes = 8388608

# [socket] (required when type="socket"; forbidden for other type values)
# [socket]
# key: socket.protocol
# required: required when type="socket"
# type: string enum
# constraints: one of "udp", "tcp", "both"
# default: none
# protocol = "tcp"
#
# key: socket.direction
# required: required when type="socket"
# type: string enum
# constraints: one of "inbound", "outbound", "both"
# default: none
# direction = "inbound"
#
# key: socket.listen_addr
# required: required when type="socket"
# type: string
# constraints: valid IP address literal
# default: none
# listen_addr = "0.0.0.0"
#
# key: socket.listen_port
# required: required when type="socket"
# type: integer
# constraints: 1..=65535
# default: none
# listen_port = 9000

# [[assets]]
# key: assets[].path
# required: optional (array entry required field)
# type: string (relative path)
# constraints: non-empty; relative path rules same as `main`; file must exist
# default: none
# note: additional keys in each assets[] entry are accepted and forwarded to manifest as JSON values
# [[assets]]
# path = "assets/config.json"
# mode = "0644"

# [wasi]
# key: wasi.args
# required: optional
# type: array(string)
# constraints: each item is non-empty string
# default: empty
# key: wasi.http_outbound
# required: optional
# type: array(string)
# constraints:
# - each item must be hostname / host:port / CIDR
# - wildcard is not supported ("*", "*.example.com" are rejected)
# - CIDR is evaluated only when request host is an IP literal
# - manager always injects localhost defaults: localhost / 127.0.0.1 / ::1
# default: empty (manager-side default injection applies)
# key: wasi.env.<KEY>
# required: optional
# type: string
# constraints: key/value must be strings; values in project_root/.env override the same keys
# default: empty
# key: wasi.mounts[] / wasi.read_only_mounts[]
# required: optional
# type: array(table)
# constraints:
# - each entry keys are exactly asset_dir and guest_path
# - asset_dir: relative path matching a directory derived from assets[].path parent directories
# - guest_path: absolute unix path; no backslashes; no path traversal
# - guest_path and asset_dir must be unique across both mounts arrays
# [wasi]
# args = ["--serve"]
# http_outbound = ["localhost", "api.example.com:443", "10.0.0.0/8"]
# [wasi.env]
# WASI_ONLY = "1"
# [[wasi.mounts]]
# asset_dir = "assets"
# guest_path = "/app/assets"
# [[wasi.read_only_mounts]]
# asset_dir = "readonly"
# guest_path = "/app/readonly"

# [capabilities]
# key: capabilities.privileged
# required: optional
# type: boolean
# constraints: bool only
# default: false
# key: capabilities.deps
# required: optional
# type: string("*") OR table(map<string, array(string)>)
# constraints:
# - string must be "*" (allow all dependency functions)
# - table keys are dependency package names or wildcard "*"
# - table values are string arrays; items must be non-empty strings
# - empty arrays are allowed (treated as unspecified)
# - "*" item means wildcard allow; duplicates normalized
# default: empty table
# key: capabilities.wasi
# required: optional
# type: boolean OR table(map<string, array(string)>)
# constraints: bool true means wildcard allow; bool false means empty policy
# default: empty table
# [capabilities]
# privileged = false
# deps = "*"
# # OR:
# [capabilities.deps]
# "yieldspace:plugin/example" = ["invoke"]
# [capabilities.wasi]
# "filesystem" = ["/app/assets"]

# [namespace_registries]
# key: namespace_registries.<namespace>
# required: optional
# type: string
# constraints: registry host string; applied only when a warg:// source omits its registry
# default resolution order when warg registry is omitted:
# - explicit *.registry
# - namespace_registries.<namespace>
# - built-in: namespace "wasi" -> "wasi.dev"
# - global default: "wa.dev"
# note: transitive WARG package は package ごとに registry を解決し、未指定 namespace は親 dependency の解決 registry を継承
# [namespace_registries]
# wasi = "wasi.dev"

# [[bindings]]
# key: bindings[].name
# required: optional (array entry required field)
# type: string
# constraints: same naming rules as `name`
# default: none
# key: bindings[].wit
# required: optional (array entry required field)
# type: string
# constraints: non-empty; must start with file:// or warg:// or oci://; legacy "<package>/<interface>" format is rejected
# default: none
# [[bindings]]
# name = "example-service"
# wit = "warg://yieldspace:plugin/example@1.0.0"

# [[dependencies]]
# key: dependencies[].name
# required: optional (array entry required field)
# type: string
# constraints: dependency package name; ASCII alnum plus . _ - : / ; no empty/path traversal components; unique in array
# default: none
# key: dependencies[].version
# required: optional (array entry required field)
# type: string
# constraints: non-empty
# default: none
# key: dependencies[].kind
# required: optional (array entry required field)
# type: string enum
# constraints: one of "native", "wasm"
# default: none
# key: dependencies[].requires
# required: optional
# type: array(string)
# constraints: non-empty dependency package names; duplicates normalized
# default: empty
# [[dependencies]]
# name = "yieldspace:plugin/example"
# version = "1.0.0"
# kind = "wasm"
# requires = ["yieldspace:plugin/base"]
# note: oci:// source の認証が必要な場合は IMAGO_OCI_USERNAME / IMAGO_OCI_PASSWORD を使用

# [dependencies.wit]
# key: dependencies[].wit
# required: optional
# type: string OR table
# constraints:
# - string: non-empty; must start with file:// or warg:// or oci://
# - table keys: source, registry
# - source: required string with file:// or warg:// or oci://
# - registry: optional string; allowed only for warg source (oci:// uses registry embedded in source)
# default when omitted:
# - source = "warg://<dependencies[].name>@<dependencies[].version>"
# - registry = resolved from explicit > namespace_registries > (wasi->wasi.dev) > wa.dev
# [dependencies.wit]
# source = "warg://yieldspace:plugin/example@1.0.0"
# registry = "wa.dev"

# [dependencies.component]
# key: dependencies[].component
# required: optional
# type: table (allowed only when dependencies[].kind="wasm")
# constraints:
# - supported keys: source, registry, sha256
# - source: required string; file:// or warg:// or oci://
# - registry: optional string; allowed only for warg source (oci:// uses registry embedded in source)
# - sha256: optional 64-char hex string
# default: none
# [dependencies.component]
# source = "file://plugins/example.wasm"
# sha256 = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

# [dependencies.capabilities]
# key: dependencies[].capabilities.*
# required: optional
# type/constraints/default: same shape as top-level [capabilities]
# [dependencies.capabilities]
# privileged = false

# -------------------------
# Unsupported / removed keys
# -------------------------
# runtime.restart_policy
# target.<name>.ca_cert
# target.<name>.client_cert
# target.<name>.known_hosts
# bindings[].target
# dependencies[].component.path
# limits.shutdown_timeout
# top-level args
