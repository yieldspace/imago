name: prup-release-pr
description: Create or update release PRs using prup line-specific plan/apply output

inputs:
  github-token:
    description: GitHub token used by gh CLI
    required: true
  base-branch:
    description: Base branch for PR
    required: false
    default: main

runs:
  using: composite
  steps:
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: '1.93.1'

    - name: Run prup release-pr action
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        set -euo pipefail
        "$GITHUB_ACTION_PATH/run.sh"
