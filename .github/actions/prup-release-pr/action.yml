name: prup-release-pr
description: Create or update release PR using prup plan/apply output

inputs:
  github-token:
    description: GitHub token used by gh CLI
    required: true
  base-branch:
    description: Base branch for PR
    required: false
    default: main
  head-branch:
    description: Head branch for PR. Defaults to codex/prup-release-<run_id>
    required: false
    default: ""
  pr-title:
    description: Pull request title
    required: false
    default: "ci: prepare release with prup"
  pr-body:
    description: Pull request body
    required: false
    default: "Automated release PR generated by prup based on Cargo workspace metadata."

runs:
  using: composite
  steps:
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: '1.93.1'

    - name: Run prup release-pr action
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_BASE_BRANCH: ${{ inputs.base-branch }}
        INPUT_HEAD_BRANCH: ${{ inputs.head-branch }}
        INPUT_PR_TITLE: ${{ inputs.pr-title }}
        INPUT_PR_BODY: ${{ inputs.pr-body }}
      run: |
        set -euo pipefail
        "$GITHUB_ACTION_PATH/run.sh"
