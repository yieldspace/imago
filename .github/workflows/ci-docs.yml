name: ci-docs

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changed:
    name: detect changes
    runs-on: ubuntu-24.04
    outputs:
      docs_related: ${{ steps.detect.outputs.docs_related }}
      workflow_related: ${{ steps.detect.outputs.workflow_related }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          docs_related=false
          workflow_related=false

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha='${{ github.event.pull_request.base.sha }}'
            head_sha='${{ github.event.pull_request.head.sha }}'
            diff_output="$(git diff --name-only --no-renames "$base_sha...$head_sha")"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            before_sha='${{ github.event.before }}'
            head_sha='${{ github.sha }}'
            if [[ "$before_sha" =~ ^0+$ ]]; then
              diff_output="$(git ls-tree -r --name-only "$head_sha")"
            else
              diff_output="$(git diff --name-only --no-renames "$before_sha...$head_sha")"
            fi
          else
            docs_related=true
            workflow_related=true
            diff_output=""
          fi

          while IFS= read -r file; do
            [[ -n "$file" ]] || continue

            case "$file" in
              book/*|docs/*|README.md|QUICKSTART.md|CONTRIBUTING.md)
                docs_related=true
                ;;
            esac

            case "$file" in
              .github/workflows/ci-docs.yml)
                workflow_related=true
                ;;
            esac
          done <<< "$diff_output"

          {
            echo "docs_related=$docs_related"
            echo "workflow_related=$workflow_related"
          } >> "$GITHUB_OUTPUT"

  docs_checks:
    name: docs checks
    needs: changed
    if: ${{ needs.changed.outputs.docs_related == 'true' || needs.changed.outputs.workflow_related == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mdbook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook@0.5.0

      - name: Install mdbook-mermaid
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook-mermaid

      - name: Build docs
        run: mdbook build book

  checks:
    name: checks
    needs:
      - changed
      - docs_checks
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Evaluate required checks
        shell: bash
        run: |
          set -euo pipefail

          event_name='${{ github.event_name }}'
          changed_result='${{ needs.changed.result }}'
          docs_related='${{ needs.changed.outputs.docs_related }}'
          workflow_related='${{ needs.changed.outputs.workflow_related }}'
          docs_result='${{ needs.docs_checks.result }}'

          echo "event_name: $event_name"
          echo "changed: $changed_result"
          echo "docs_related: $docs_related"
          echo "workflow_related: $workflow_related"
          echo "docs_checks: $docs_result"

          [[ "$changed_result" == "success" ]] || {
            echo "::error::changed job failed ($changed_result)"
            exit 1
          }

          if [[ "$event_name" == "pull_request" ]]; then
            if [[ "$docs_related" == "true" || "$workflow_related" == "true" ]]; then
              [[ "$docs_result" == "success" ]] || {
                echo "::error::docs_checks must succeed when docs or workflow files are changed."
                exit 1
              }
            else
              [[ "$docs_result" == "skipped" || "$docs_result" == "success" ]] || {
                echo "::error::docs_checks must be skipped or succeed for non-docs pull requests."
                exit 1
              }
            fi
          else
            [[ "$docs_result" == "success" || "$docs_result" == "skipped" ]] || {
              echo "::error::docs_checks must succeed or be skipped on push and workflow_dispatch events."
              exit 1
            }
          fi
