name: imago-build.yml

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/imago-build.yml

permissions:
  contents: read

concurrency:
  group: ci-imago-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'imago-v') || startsWith(github.event.release.tag_name, 'imagod-v')
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_zig: false
            runs_on: imago-cross-runner-set
          - target: aarch64-unknown-linux-gnu
            use_zig: false
            runs_on: imago-cross-runner-set
          - target: armv7-unknown-linux-gnueabihf
            use_zig: false
            runs_on: imago-cross-runner-set
          - target: riscv64gc-unknown-linux-gnu
            use_zig: false
            runs_on: imago-cross-runner-set
          - target: aarch64-unknown-linux-musl
            use_zig: true
            runs_on: imago-cross-runner-set
          - target: x86_64-unknown-linux-musl
            use_zig: true
            runs_on: imago-cross-runner-set
          - target: armv7-unknown-linux-musleabihf
            use_zig: true
            runs_on: imago-cross-runner-set
          - target: riscv64gc-unknown-linux-musl
            use_zig: true
            runs_on: imago-cross-runner-set
          - target: x86_64-apple-darwin
            use_zig: false
            runs_on: macos-latest
          - target: aarch64-apple-darwin
            use_zig: false
            runs_on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.93.1'
          targets: ${{ matrix.target }}

      - name: Build GNU target (main/PR)
        if: ${{ !(matrix.use_zig) && github.event_name != 'release' }}
        run: cargo build --locked --release --target "${{ matrix.target }}" -p imago-cli -p imagod --bin imago --bin imagod

      - name: "Build GNU target (release: imago)"
        if: ${{ !(matrix.use_zig) && github.event_name == 'release' && startsWith(github.event.release.tag_name, 'imago-v') }}
        run: cargo build --locked --release --target "${{ matrix.target }}" -p imago-cli --bin imago

      - name: "Build GNU target (release: imagod)"
        if: ${{ !(matrix.use_zig) && github.event_name == 'release' && startsWith(github.event.release.tag_name, 'imagod-v') }}
        run: cargo build --locked --release --target "${{ matrix.target }}" -p imagod --bin imagod

      - name: Build musl target with zig (main/PR)
        if: matrix.use_zig && github.event_name != 'release'
        run: cargo zigbuild --locked --release --target "${{ matrix.target }}" -p imago-cli -p imagod --bin imago --bin imagod

      - name: "Build musl target with zig (release: imago)"
        if: matrix.use_zig && github.event_name == 'release' && startsWith(github.event.release.tag_name, 'imago-v')
        run: cargo zigbuild --locked --release --target "${{ matrix.target }}" -p imago-cli --bin imago

      - name: "Build musl target with zig (release: imagod)"
        if: matrix.use_zig && github.event_name == 'release' && startsWith(github.event.release.tag_name, 'imagod-v')
        run: cargo zigbuild --locked --release --target "${{ matrix.target }}" -p imagod --bin imagod

      - name: Resolve binary versions
        if: github.event_name != 'release'
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          imago_cli_version="$(sed -nE 's/^version = "([^"]+)"$/\1/p' crates/imago-cli/Cargo.toml | head -n1)"
          imagod_version="$(awk 'BEGIN{in_ws=0} /^\[workspace\.package\]/{in_ws=1;next} /^\[/{in_ws=0} in_ws && /^version = / {gsub(/"/,"",$3); print $3; exit}' Cargo.toml)"
          echo "imago_version=${imago_cli_version}" >> "$GITHUB_OUTPUT"
          echo "imagod_version=${imagod_version}" >> "$GITHUB_OUTPUT"

      - name: Stage release artifact (imago)
        if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'imago-v')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/imago" "dist/imago-${{ matrix.target }}"

      - name: Stage release artifact (imagod)
        if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'imagod-v')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/imagod" "dist/imagod-${{ matrix.target }}"

      - name: Generate release checksum (imagod)
        if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'imagod-v')
        shell: bash
        run: |
          set -euo pipefail
          (
            cd dist
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "imagod-${{ matrix.target }}" > "imagod-${{ matrix.target }}.sha256"
            elif command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "imagod-${{ matrix.target }}" > "imagod-${{ matrix.target }}.sha256"
            else
              echo "error: neither sha256sum nor shasum is available" >&2
              exit 1
            fi
          )

      - name: Stage CI artifacts (main/PR)
        if: github.event_name != 'release'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/imago" "dist/imago-${{ matrix.target }}-${{ steps.versions.outputs.imago_version }}"
          cp "target/${{ matrix.target }}/release/imagod" "dist/imagod-${{ matrix.target }}-${{ steps.versions.outputs.imagod_version }}"

      - name: Upload release artifacts
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: release-${{ github.event.release.tag_name }}-${{ matrix.target }}
          path: dist/*
          retention-days: 7

      - name: Upload CI artifacts
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: ${{ matrix.target }}-binaries-${{ github.sha }}
          path: dist/*
          retention-days: 7

  upload-release-assets:
    name: Upload release assets
    needs:
      - build
    if: github.event_name == 'release' && (startsWith(github.event.release.tag_name, 'imago-v') || startsWith(github.event.release.tag_name, 'imagod-v')) && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: release-${{ github.event.release.tag_name }}-*
          merge-multiple: true

      - name: List artifacts
        run: ls -R dist

      - name: Upload artifacts to existing GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
