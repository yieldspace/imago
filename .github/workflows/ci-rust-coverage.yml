name: ci-rust-coverage

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  actions: read
  pull-requests: write
  statuses: write

concurrency:
  group: ci-rust-coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: coverage
    runs-on: imago-default-runner-set
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Restore Rust cache
        if: ${{ runner.environment != 'self-hosted' }}
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate lcov report
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Build coverage summary
        run: |
          cargo llvm-cov report --summary-only | tee coverage-summary.txt
          {
            echo "## Rust Coverage Summary"
            echo
            cat coverage-summary.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish coverage report and PR comment
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: getsentry/codecov-action@3d682781e1a76d1b374d035718b8937b143043d8
        with:
          token: ${{ github.token }}
          files: lcov.info
          coverage-format: lcov
          disable-search: true
          enable-tests: false
          enable-coverage: true
          post-pr-comment: true
          fail-ci-if-error: true
          fail-on-error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage-lcov
          path: |
            lcov.info
            coverage-summary.txt
          if-no-files-found: error
          retention-days: 14
