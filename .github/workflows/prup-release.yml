name: prup-release.yml

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prup-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prup-release:
    name: prup release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run prup release action
        uses: ./.github/actions/prup-release
        with:
          github-token: ${{ secrets.RELEASE_PLZ_TOKEN }}
          remote: origin

  prup-release-pr:
    name: prup release-pr
    if: github.event_name == 'push'
    needs: prup-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run prup release-pr action
        uses: ./.github/actions/prup-release-pr
        with:
          github-token: ${{ secrets.RELEASE_PLZ_TOKEN }}
          base-branch: main
          head-branch: codex/prup-release-${{ github.run_id }}
          pr-title: ci: prepare release with prup
          pr-body: Automated release PR generated by prup based on Cargo workspace metadata.
