name: cargo-deny

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: cargo-deny-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-deny-linux-v1
          cache-targets: "false"
          cache-bin: "true"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: cargo deny checks
        run: cargo deny --workspace check bans licenses sources

  advisories:
    name: advisories
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-deny-linux-v1
          cache-targets: "false"
          cache-bin: "true"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: cargo deny fetch db
        run: cargo deny fetch db

      - name: cargo deny advisories
        run: cargo deny --workspace check -W unmaintained advisories --disable-fetch
