name: cargo-deny

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: cargo-deny-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: checks
    runs-on: imago-dind-runner-set
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: cargo deny (blocking)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: stable
          manifest-path: ./Cargo.toml
          command: check bans licenses sources
          arguments: --workspace

  advisories:
    name: advisories
    runs-on: imago-default-runner-set
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        if: ${{ runner.environment != 'self-hosted' }}
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: cargo deny fetch db
        run: cargo deny fetch db

      - name: cargo deny advisories
        run: cargo deny --workspace check -W unmaintained advisories --disable-fetch
