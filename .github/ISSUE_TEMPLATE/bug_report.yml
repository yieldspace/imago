name: Bug report
description: Report a reproducible defect in imago for embedded Linux deployment and runtime workflows.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        imago is currently under development and mainly used in private networks.
        Please share enough context for us to understand where the issue occurs in the CLI -> imagod workflow.

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Select the main area where you observed the problem.
      options:
        - imago-cli
        - imagod
        - plugin
        - docs
        - ci/workflow
        - other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A concise description of the bug.
      placeholder: Describe the unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Optional but helpful. Include exact commands, inputs, and configuration when possible.
      placeholder: |
        1. Run ...
        2. Deploy ...
        3. Observe ...

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened, including logs or error messages.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: imago / imagod version (or commit SHA).
      placeholder: v0.0.0 or abc1234
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Choose the environment where the issue occurs.
      options:
        - local-imagod example
        - embedded Linux target
        - CI
        - other

  - type: textarea
    id: resource_impact
    attributes:
      label: Resource impact (optional)
      description: Share CPU, memory, or binary-size impact if relevant. Write "unknown" if not measured.
      placeholder: "Example: +20 MiB peak RSS during deploy, unknown CPU impact."

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, screenshots, traces, or related issues.
