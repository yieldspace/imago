name: Feature request
description: Propose an improvement to imago.
title: "[feature] "
labels:
  - enhancement
body:
  - type: dropdown
    id: component
    attributes:
      label: Target component
      description: Select the main area for this proposal.
      options:
        - imago-cli
        - imagod
        - plugin
        - docs
        - ci/workflow
        - other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Describe the limitation or pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected behavior or interface shape.
      placeholder: Outline your preferred solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternatives or trade-offs you evaluated.

  - type: textarea
    id: impact
    attributes:
      label: Resource impact
      description: Expected CPU, memory, or binary-size impact for embedded targets.
      placeholder: Note if impact is unknown.

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria (optional)
      description: Describe completion criteria or observable outcomes for users/operators.
      placeholder: "Example: Deploy command succeeds with <= X MiB peak RSS and updated docs."

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked for similar existing issues.
          required: true
