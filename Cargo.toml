[package]
name = "imago"
version = "0.1.0"
edition = "2024"
publish = false
autotests = false
build = "build.rs"

[features]
default = []
e2e = []

[dev-dependencies]
anyhow = { workspace = true }
hex = { workspace = true }
rcgen = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }

[profile.release]
lto = true
opt-level = "s"
codegen-units = 1

[workspace]
resolver = "3"
members = [
    "crates/*",
    "examples/local-imagod",
    "examples/local-imagod-http",
    "examples/local-imagod-plugin-native-admin",
    "examples/local-imagod-plugin-hello",
    "examples/local-imagod-socket",
    "plugins/*", "e2e",
]

[workspace.dependencies]
async-trait = "0.1.89"
anyhow = "1.0.101"
base64 = "0.22.1"
bytes = "1.11.1"
ciborium = "0.2.2"
chrono = "0.4.43"
clap = "4.5.58"
indicatif = "0.17.11"
futures-util = "0.3.31"
hex = "0.4.3"
hmac = "0.12.1"
http-body-util = "0.1.3"
hyper = "1.8.1"
hyper-util = "0.1.18"
quinn = "0.11.9"
quote = "1.0.42"
rcgen = "0.14.7"
rustls = "0.23.36"
rustls-pemfile = "2.2.0"
serde = "1.0.228"
serde_bytes = "0.11.17"
serde_json = "1.0.149"
sha2 = "0.10.9"
tar = "0.4.44"
thiserror = "2.0.18"
time = "0.3.36"
tempfile = "3.17.1"
tokio = "1.49.0"
toml = "0.8.23"
proc-macro2 = "1.0.103"
url = "2.5.4"
uuid = "1.21.0"
wasm-pkg-client = "0.15.0"
wasm-pkg-common = "0.15.0"
wasmtime = "41.0.3"
wasmtime-wasi = "41.0.3"
wasmtime-wasi-http = "41.0.3"
wat = "1.244.0"
wit-component = "0.244.0"
wit-parser = "0.244.0"
web-transport-quinn = "0.11.1"
syn = "2.0.111"

imago-plugin-imago-admin = { path = "plugins/imago-admin" }
imago-plugin-imago-node = { path = "plugins/imago-node" }
imago-lockfile = { path = "crates/imago-lockfile" }
imago-plugin-macros = { path = "crates/imago-plugin-macros" }
imago-protocol = { path = "crates/imago-protocol" }
imagod-common = { path = "crates/imagod-common" }
imagod-config = { path = "crates/imagod-config" }
imagod-control = { path = "crates/imagod-control" }
imagod-ipc = { path = "crates/imagod-ipc" }
imagod-runtime = { path = "crates/imagod-runtime", default-features = false }
imagod-runtime-bootstrap = { path = "crates/imagod-runtime-bootstrap" }
imagod-runtime-control = { path = "crates/imagod-runtime-control" }
imagod-runtime-ingress = { path = "crates/imagod-runtime-ingress" }
imagod-runtime-internal = { path = "crates/imagod-runtime-internal" }
imagod-runtime-wasmtime = { path = "crates/imagod-runtime-wasmtime" }
imagod-server = { path = "crates/imagod-server" }

[[test]]
name = "e2e_cli"
path = "tests/e2e_cli.rs"
required-features = ["e2e"]

[[test]]
name = "e2e_http"
path = "tests/e2e_http.rs"
required-features = ["e2e"]

[[test]]
name = "e2e_rpc"
path = "tests/e2e_rpc.rs"
required-features = ["e2e"]

[[test]]
name = "e2e_rpc_single"
path = "tests/e2e_rpc_single.rs"
required-features = ["e2e"]
