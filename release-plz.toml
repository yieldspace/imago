[workspace]
release = false
release_always = false
publish = false
git_only = false
git_tag_enable = false
git_release_enable = false
git_release_type = "pre"
changelog_update = true
pr_labels = ["release"]

[[package]]
name = "imago-cli"
release = true
publish = false
git_only = true
git_tag_enable = true
git_release_enable = true
git_tag_name = "imago-v{{ version }}"
git_release_name = "imago-v{{ version }}"
git_release_body = """
## CLI Release

{{ changelog }}
"""

