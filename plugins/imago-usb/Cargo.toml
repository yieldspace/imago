[package]
name = "imago-plugin-imago-usb"
version = "0.9.2"
edition.workspace = true
license.workspace = true
publish = false

[features]
default = []
vendored-libusb = ["rusb/vendored"]

[dependencies]
imago-plugin-macros = { workspace = true }
imagod-runtime-wasmtime = { workspace = true }
libc = { workspace = true }
rusb = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "time"] }
wasmtime = { workspace = true, features = ["component-model"] }
