name = "local-imagod-plugin-camera-app"
main = "target/wasm32-wasip2/release/local-imagod-plugin-camera-app.wasm"
type = "cli"

[build]
command = "CARGO_TARGET_DIR=target cargo build --target wasm32-wasip2 --release -p imago-plugin-imago-camera -p local-imagod-plugin-camera-app"

[[dependencies]]
version = "0.2.0"
kind = "native"
path = "../../plugins/imago-v4l2/wit"

[[dependencies]]
version = "0.3.0"
kind = "wasm"
path = "../../plugins/imago-camera/wit"
requires = ["imago:v4l2"]

[dependencies.component]
path = "target/wasm32-wasip2/release/imago_plugin_imago_camera.wasm"

[dependencies.capabilities]
wasi = true

[dependencies.capabilities.deps]
"imago:v4l2" = ["*"]

[capabilities]
privileged = false
wasi = true

[capabilities.deps]
"imago:camera" = ["*"]

[resources.v4l2]
# Replace this with the Linux V4L2 device node that should be visible to the guest.
paths = ["/dev/video0"]
max_frame_bytes = 8388608
max_timeout_ms = 30000
max_paths = 128
buffer_count = 4

[target.default]
remote = "ssh://localhost?socket=/tmp/imagod-local-plugin-camera.sock"
