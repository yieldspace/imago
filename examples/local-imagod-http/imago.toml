name = "local-imagod-http-app"
main = "target/wasm32-wasip2/release/local_imagod_http_app.wasm"
type = "http"

[http]
port = 18080

[build]
command = "CARGO_TARGET_DIR=target cargo build --target wasm32-wasip2 --release"

[capabilities]
wasi = true

[target.default]
remote = "ssh://localhost?socket=/tmp/imagod-local-http.sock"
