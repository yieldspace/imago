name = "local-imagod-socket-app"
main = "target/wasm32-wasip2/release/local-imagod-socket-app.wasm"
type = "socket"

[socket]
protocol = "udp"
direction = "both"
listen_addr = "0.0.0.0"
listen_port = 5000

[build]
command = "CARGO_TARGET_DIR=target cargo build --target wasm32-wasip2 --release"

[capabilities]
wasi = true

[target.default]
remote = "ssh://localhost?socket=/tmp/imagod-local-socket.sock"
