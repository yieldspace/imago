listen_addr = "0.0.0.0:4443"
storage_root = "/var/lib/imagod/bob"
server_version = "imagod/imago-compose-bindings-bob"

[tls]
server_key = "/etc/imago/example/certs/bob/server.key"
client_public_keys = ["9d7132feb8f208634935653b8af8eed729a4071ef026f101858b20e73a883b29"]
known_public_keys = {}

[runtime]
chunk_size = 1048576
max_inflight_chunks = 16
upload_session_ttl_secs = 900
stop_grace_timeout_secs = 30
runner_ready_timeout_secs = 3
runner_log_buffer_bytes = 262144
epoch_tick_interval_ms = 50
