[[compose.greeter.services]]
imago = "services/rpc-greeter/imago.toml"

[[compose.client.services]]
imago = "services/cli-client/imago.toml"

[profile.greeter]
config = "greeter"

[profile.client]
config = "client"

[target.alice]
remote = "imagod-alice:4443"
server_name = "imagod-alice"
client_key = "certs/control/client.key"

[target.bob]
remote = "imagod-bob:4443"
server_name = "imagod-bob"
client_key = "certs/control/client.key"
