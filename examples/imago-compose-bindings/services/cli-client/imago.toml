name = "cli-client"
main = "target/wasm32-wasip2/release/cli-client.wasm"
type = "cli"

[build]
command = "cargo build --target wasm32-wasip2 --release"

[[dependencies]]
name = "imago:node"
version = "0.1.0"
kind = "native"
wit = "file://../../../../plugins/imago-node/wit"

[[dependencies]]
name = "acme:clock"
version = "0.1.0"
kind = "wasm"
wit = "file://../rpc-greeter/wit/world.wit"
component = { source = "file://../rpc-greeter/target/wasm32-wasip2/release/rpc-greeter.wasm" }

[dependencies.capabilities]
privileged = false

[dependencies.capabilities.wasi]
"wasi:cli/environment@0.2.6" = ["*"]
"wasi:cli/exit@0.2.6" = ["*"]
"wasi:cli/stderr@0.2.6" = ["*"]
"wasi:cli/stdin@0.2.6" = ["*"]
"wasi:cli/stdout@0.2.6" = ["*"]
"wasi:clocks/monotonic-clock@0.2.6" = ["*"]
"wasi:clocks/wall-clock@0.2.6" = ["*"]
"wasi:io/error@0.2.6" = ["*"]
"wasi:io/poll@0.2.6" = ["*"]
"wasi:io/streams@0.2.6" = ["*"]
"wasi:random/insecure-seed@0.2.6" = ["*"]
"wasi:random/insecure@0.2.6" = ["*"]
"wasi:random/random@0.2.6" = ["*"]

[capabilities]
privileged = false

[capabilities.deps]
"acme:clock" = ["*"]
"imago:node" = ["*"]

[capabilities.wasi]
"wasi:cli/environment@0.2.6" = ["*"]
"wasi:cli/exit@0.2.6" = ["*"]
"wasi:cli/stderr@0.2.6" = ["*"]
"wasi:cli/stdin@0.2.6" = ["*"]
"wasi:cli/stdout@0.2.6" = ["*"]
"wasi:clocks/monotonic-clock@0.2.6" = ["*"]
"wasi:clocks/wall-clock@0.2.6" = ["*"]
"wasi:io/error@0.2.6" = ["*"]
"wasi:io/poll@0.2.6" = ["*"]
"wasi:io/streams@0.2.6" = ["*"]
"wasi:random/insecure-seed@0.2.6" = ["*"]
"wasi:random/insecure@0.2.6" = ["*"]
"wasi:random/random@0.2.6" = ["*"]

[[bindings]]
name = "rpc-greeter"
wit = "acme:clock/api"
