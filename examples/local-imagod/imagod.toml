listen_addr = "127.0.0.1:4443"
storage_root = ".imagod-data"
server_version = "imagod/local-example"
protocol_draft = "imago-mvp-v1"

[tls]
server_cert = "certs/server.crt"
server_key = "certs/server.key"
client_ca_cert = "certs/ca.crt"

[runtime]
chunk_size = 1048576
max_inflight_chunks = 16
upload_session_ttl_secs = 900

