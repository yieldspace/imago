[package]
name = "imagod"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "imagod"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
imagod-config = { workspace = true }
imagod-control = { workspace = true }
imagod-runtime = { workspace = true }
imagod-server = { workspace = true }
rustls = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal", "sync", "time"] }
web-transport-quinn = { workspace = true }
