[package]
name = "imagod"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "imagod"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.101"
imagod-config = { path = "../imagod-config" }
imagod-control = { path = "../imagod-control" }
imagod-runtime = { path = "../imagod-runtime" }
imagod-server = { path = "../imagod-server" }
rustls = "0.23.36"
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread", "signal", "sync", "time"] }
web-transport-quinn = "0.11.1"
