[package]
name = "imagod"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "imagod"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.101"
base64 = "0.22.1"
hex = "0.4.3"
imago-protocol = { path = "../imago-protocol" }
quinn = "0.11.9"
rustls = "0.23.36"
rustls-pemfile = "2.2.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10.9"
tar = "0.4.44"
thiserror = "2.0.18"
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread", "sync", "fs", "io-util", "time", "signal", "net", "process"] }
toml = "0.8.23"
url = "2.5.8"
uuid = { version = "1.20.0", features = ["serde", "v4"] }
walkdir = "2.5.0"
wasmtime = { version = "41.0.3", features = ["component-model"] }
wasmtime-wasi = "41.0.3"
web-transport-quinn = "0.11.1"
