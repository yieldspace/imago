[package]
name = "imagod-ipc"
version = "0.1.0"
edition = "2024"

[dependencies]
base64 = "0.22.1"
hex = "0.4.3"
imago-protocol = { path = "../imago-protocol" }
imagod-common = { path = "../imagod-common" }
serde = { version = "1.0.228", features = ["derive"] }
sha2 = "0.10.9"
tokio = { version = "1.49.0", features = ["io-util", "macros", "net", "rt"] }
uuid = { version = "1.20.0", features = ["v4"] }
