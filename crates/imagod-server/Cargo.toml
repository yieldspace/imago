[package]
name = "imagod-server"
version = "0.1.0"
edition = "2024"

[dependencies]
imago-protocol = { path = "../imago-protocol" }
imagod-common = { path = "../imagod-common" }
imagod-config = { path = "../imagod-config" }
imagod-control = { path = "../imagod-control" }
quinn = "0.11.9"
rustls = "0.23.36"
rustls-pemfile = "2.2.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.49.0", features = ["macros", "rt", "time"] }
uuid = { version = "1.20.0", features = ["v4"] }
web-transport-quinn = "0.11.1"
