[package]
name = "imago-cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "imago"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.97"
base64 = "0.22.1"
clap = { version = "4.5.31", features = ["derive"] }
hex = "0.4.3"
imago-protocol = { path = "../imago-protocol" }
quinn = "0.11.9"
rustls = "0.23.23"
rustls-pemfile = "2.2.0"
rcgen = "0.14.7"
serde = { version = "1.0.218", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10.8"
tar = "0.4.44"
time = "0.3.36"
tokio = { version = "1.43.0", features = ["macros", "rt-multi-thread"] }
toml = "0.8.20"
url = "2.5.4"
uuid = { version = "1.15.1", features = ["v4"] }
web-transport-quinn = "0.11.1"
