[package]
name = "imagod-control"
version = "0.1.0"
edition = "2024"

[dependencies]
base64 = "0.22.1"
hex = "0.4.3"
imago-protocol = { path = "../imago-protocol" }
imagod-common = { path = "../imagod-common" }
imagod-ipc = { path = "../imagod-ipc" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10.9"
tar = "0.4.44"
tokio = { version = "1.49.0", features = ["fs", "io-util", "macros", "net", "process", "rt-multi-thread", "sync", "time"] }
uuid = { version = "1.20.0", features = ["v4"] }
